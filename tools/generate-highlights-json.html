<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generate Highlights JSON</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      line-height: 1.5;
      background: #111;
      color: #fff;
    }

    h1 {
      margin-bottom: 16px;
    }

    input, button {
      margin: 8px 0;
      padding: 10px 14px;
      font: inherit;
    }

    pre {
      margin-top: 20px;
      padding: 16px;
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 400px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Generate home-highlights.json</h1>

  <input
    type="file"
    id="folderPicker"
    webkitdirectory
    multiple
    accept="image/*"
  />

  <div class="actions">
    <button id="downloadBtn" disabled>Download JSON</button>
  </div>

  <pre id="output">Select your highlights/gallery folder...</pre>

  <script>
    const folderPicker = document.getElementById("folderPicker");
    const output = document.getElementById("output");
    const downloadBtn = document.getElementById("downloadBtn");

    let generatedJson = null;

    folderPicker.addEventListener("change", async (event) => {
      const files = [...event.target.files].filter(file => file.type.startsWith("image/"));

      if (!files.length) {
        output.textContent = "No image files found.";
        downloadBtn.disabled = true;
        return;
      }

      const items = await Promise.all(files.map(readImageMeta));

      items.sort((a, b) => a.image.localeCompare(b.image));

      generatedJson = {
        sectionTitle: "Highlights",
        sectionSubtitle: "A quick look inside Funenza.",
        items
      };

      output.textContent = JSON.stringify(generatedJson, null, 2);
      downloadBtn.disabled = false;
    });

    downloadBtn.addEventListener("click", () => {
      if (!generatedJson) return;

      const blob = new Blob(
        [JSON.stringify(generatedJson, null, 2)],
        { type: "application/json" }
      );

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "home-highlights.json";
      link.click();
      URL.revokeObjectURL(url);
    });

    function fileNameToTitle(name) {
      return name
        .replace(/\.[^/.]+$/, "")
        .replace(/[-_]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function getOrientation(width, height) {
      if (width === height) return "square";
      return width > height ? "landscape" : "portrait";
    }

    function readImageMeta(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        const url = URL.createObjectURL(file);

        img.onload = () => {
          const baseName = file.name.replace(/\.[^/.]+$/, "");
          const title = fileNameToTitle(file.name);

          resolve({
            id: baseName,
            title,
            subtitle: "",
            image: file.name,
            alt: title,
            featured: false,
            width: img.naturalWidth,
            height: img.naturalHeight,
            orientation: getOrientation(img.naturalWidth, img.naturalHeight)
          });

          URL.revokeObjectURL(url);
        };

        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error(`Failed to read image: ${file.name}`));
        };

        img.src = url;
      });
    }
  </script>
</body>
</html>
